version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dealscope-db
    environment:
      POSTGRES_USER: dealscope
      POSTGRES_PASSWORD: dealscope
      POSTGRES_DB: dealscope
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealscope"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dealscope-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dealscope-server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://dealscope:dealscope@postgres:5432/dealscope
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      PORT: 3001
      NODE_ENV: development
      CLIENT_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dealscope-client
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_MAPBOX_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src

volumes:
  pgdata:
  redisdata:
